name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Security - Secret/Leak Detection
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run npm audit (backend)
        run: npm audit --audit-level=high --json > backend-audit.json || true
        working-directory: ./backend
        continue-on-error: true

      - name: Run npm audit (frontend)
        run: npm audit --audit-level=high --json > frontend-audit.json || true
        working-directory: ./Frontend
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            ./backend/backend-audit.json
            ./Frontend/frontend-audit.json
          retention-days: 30

  # CI - Build and Test
  build:
    runs-on: ubuntu-latest
    needs: security
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./Frontend
        env:
          VITE_API_URL: https://nftfract.duckdns.org
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_SEPOLIA_MARKETPLACE_ADDRESS: ${{ secrets.VITE_SEPOLIA_MARKETPLACE_ADDRESS }}
          VITE_SEPOLIA_FRACTIONALIZE_ADDRESS: ${{ secrets.VITE_SEPOLIA_FRACTIONALIZE_ADDRESS }}
          VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS: ${{ secrets.VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS }}

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./Frontend/dist
          retention-days: 7

      - name: Lint backend (syntax check)
        run: node --check server.js
        working-directory: ./backend

      - name: Verify backend starts
        run: |
          timeout 10s node server.js &
          sleep 5
          curl -f http://localhost:4000/health || exit 1
          pkill -f "node server.js" || true
        working-directory: ./backend
        env:
          PORT: 4000
          JWT_SECRET: test-secret
          MONGO_URI: ${{ secrets.MONGO_URI }}
          RPC_URL: ${{ secrets.VITE_RPC_URL }}
          CORS_ORIGIN: http://localhost:3000

  # CD - Deploy with Rollback
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-dist

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd art-shard-mart
            
            # Save current commit for rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo $PREVIOUS_COMMIT > /tmp/previous_commit
            
            # Pull latest
            git pull origin main
            
            # Build and deploy
            docker-compose down
            docker-compose up -d --build
            
            # Wait for backend to be healthy (up to 90 seconds)
            echo "Waiting for backend to be healthy..."
            for i in {1..18}; do
              if docker exec artshard-backend curl -sf http://localhost:4000/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy!"
                break
              fi
              echo "Attempt $i/18 - waiting 5s..."
              sleep 5
            done
            
            # Final health check
            if ! docker exec artshard-backend curl -sf http://localhost:4000/health > /dev/null; then
              echo "❌ Health check failed! Rolling back..."
              
              # Rollback to previous commit
              git checkout main
              git reset --hard $PREVIOUS_COMMIT
              docker-compose down
              docker-compose up -d --build
              
              echo "🔄 Rolled back to $PREVIOUS_COMMIT"
              exit 1
            fi
            
            echo "✅ Deployment successful!"
            docker system prune -f

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: [security, build, deploy]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "🚨 Pipeline failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
