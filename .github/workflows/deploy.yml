name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:

  # ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend npm audit
        run: npm audit --audit-level=high || true
        working-directory: ./backend

      - name: Frontend npm audit
        run: npm audit --audit-level=high || true
        working-directory: ./Frontend


  # ---------------- BUILD + PUSH ----------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---------- Frontend Validation ----------
      - name: Install frontend deps
        run: npm ci
        working-directory: ./Frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./Frontend

      # ---------- Backend Validation ----------
      - name: Install backend deps
        run: npm ci
        working-directory: ./backend

      - name: Syntax check backend
        run: node --check server.js
        working-directory: ./backend

      # ---------- Docker Login (CI) ----------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- Build Backend ----------
      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/artshard:backend-${{ github.sha }} \
            ./backend

      - name: Push backend image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/artshard:backend-${{ github.sha }}

      # ---------- Build Frontend ----------
      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/artshard:frontend-${{ github.sha }} \
            ./Frontend

      - name: Push frontend image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/artshard:frontend-${{ github.sha }}


  # ---------------- DEPLOY WITH AUTO ROLLBACK ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${{ github.sha }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            cd art-shard-mart

            echo "Docker login..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            echo "Detecting previous image..."
            PREVIOUS_IMAGE=$(docker inspect artshard-backend \
              --format='{{.Config.Image}}' 2>/dev/null)

            PREVIOUS_TAG=$(echo $PREVIOUS_IMAGE | cut -d':' -f2 | sed 's/backend-//')

            echo "Pulling new images..."
            docker pull $DOCKERHUB_USERNAME/artshard:backend-$IMAGE_TAG
            docker pull $DOCKERHUB_USERNAME/artshard:frontend-$IMAGE_TAG

            export IMAGE_TAG=$IMAGE_TAG
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME

            docker-compose down
            docker-compose up -d

            echo "Waiting for backend health..."

            for i in {1..18}; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' artshard-backend 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                echo "Deployment successful"
                docker system prune -f
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed. Rolling back..."

            if [ -n "$PREVIOUS_TAG" ]; then
              export IMAGE_TAG=$PREVIOUS_TAG
              docker-compose down
              docker-compose up -d
              echo "Rolled back to $PREVIOUS_TAG"
            else
              echo "No previous version available"
            fi

            exit 1


  # ---------------- FAILURE NOTIFICATION ----------------
  notify-failure:
    runs-on: ubuntu-latest
    needs: [security, build-and-push, deploy]
    if: failure()

    steps:
      - name: Log failure
        run: |
          echo " Pipeline failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
