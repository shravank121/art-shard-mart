name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # CI - Build and Test
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./Frontend
        env:
          VITE_API_URL: https://nftfract.duckdns.org
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_SEPOLIA_MARKETPLACE_ADDRESS: ${{ secrets.VITE_SEPOLIA_MARKETPLACE_ADDRESS }}
          VITE_SEPOLIA_FRACTIONALIZE_ADDRESS: ${{ secrets.VITE_SEPOLIA_FRACTIONALIZE_ADDRESS }}
          VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS: ${{ secrets.VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS }}

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Lint backend (syntax check)
        run: node --check server.js
        working-directory: ./backend

      - name: Verify backend starts
        run: |
          timeout 10s node server.js &
          sleep 5
          curl -f http://localhost:4000/health || exit 1
          pkill -f "node server.js" || true
        working-directory: ./backend
        env:
          PORT: 4000
          JWT_SECRET: test-secret
          MONGO_URI: ${{ secrets.MONGO_URI }}
          RPC_URL: ${{ secrets.VITE_RPC_URL }}
          CORS_ORIGIN: http://localhost:3000

  # CD - Deploy (only on main branch push)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd art-shard-mart
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker system prune -f
