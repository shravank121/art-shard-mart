name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:

  # ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend npm audit
        run: npm audit --audit-level=high --json > backend-audit.json || true
        working-directory: ./backend

      - name: Frontend npm audit
        run: npm audit --audit-level=high --json > frontend-audit.json || true
        working-directory: ./Frontend

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            ./backend/backend-audit.json
            ./Frontend/frontend-audit.json


  # ---------------- BUILD + IMAGE PUSH ----------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------- Frontend Validation --------
      - run: npm ci
        working-directory: ./Frontend

      - run: npm run build
        working-directory: ./Frontend
        env:
          VITE_API_URL: https://nftfract.duckdns.org
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_SEPOLIA_MARKETPLACE_ADDRESS: ${{ secrets.VITE_SEPOLIA_MARKETPLACE_ADDRESS }}
          VITE_SEPOLIA_FRACTIONALIZE_ADDRESS: ${{ secrets.VITE_SEPOLIA_FRACTIONALIZE_ADDRESS }}
          VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS: ${{ secrets.VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS }}

      # -------- Backend Validation --------
      - run: npm ci
        working-directory: ./backend

      - run: node --check server.js
        working-directory: ./backend

      - name: Verify backend boots
        run: |
          timeout 10s node server.js &
          sleep 5
          curl -f http://localhost:4000/health || exit 1
          pkill -f "node server.js" || true
        working-directory: ./backend
        env:
          PORT: 4000
          JWT_SECRET: test-secret
          MONGO_URI: ${{ secrets.MONGO_URI }}
          RPC_URL: ${{ secrets.VITE_RPC_URL }}
          CORS_ORIGIN: http://localhost:3000

      # -------- Docker Login --------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------- Build Backend Image --------
      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/artshard-backend:${{ github.sha }} \
            ./backend

      - name: Push backend image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/artshard-backend:${{ github.sha }}

      # -------- Build Frontend Image --------
      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://nftfract.duckdns.org \
            --build-arg VITE_RPC_URL=${{ secrets.VITE_RPC_URL }} \
            --build-arg VITE_SEPOLIA_MARKETPLACE_ADDRESS=${{ secrets.VITE_SEPOLIA_MARKETPLACE_ADDRESS }} \
            --build-arg VITE_SEPOLIA_FRACTIONALIZE_ADDRESS=${{ secrets.VITE_SEPOLIA_FRACTIONALIZE_ADDRESS }} \
            --build-arg VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS=${{ secrets.VITE_SEPOLIA_FRACTION_MARKETPLACE_ADDRESS }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/artshard-frontend:${{ github.sha }} \
            ./Frontend

      - name: Push frontend image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/artshard-frontend:${{ github.sha }}



  # ---------------- DEPLOY WITH AUTO ROLLBACK ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG=${{ github.sha }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            cd art-shard-mart

            echo "Detecting currently running image..."
            PREVIOUS_TAG=$(docker inspect artshard-backend \
              --format='{{.Config.Image}}' 2>/dev/null | awk -F: '{print $2}')

            echo "Previous tag: $PREVIOUS_TAG"

            echo "Pulling new images..."
            docker pull $DOCKERHUB_USERNAME/artshard-backend:$IMAGE_TAG
            docker pull $DOCKERHUB_USERNAME/artshard-frontend:$IMAGE_TAG

            echo "Deploying new version..."
            export IMAGE_TAG=$IMAGE_TAG
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME

            docker-compose down
            docker-compose up -d

            echo "Waiting for backend health..."

            for i in {1..18}; do
              if docker exec artshard-backend curl -sf http://localhost:4000/health > /dev/null; then
                echo "Deployment successful"
                docker system prune -f
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed. Rolling back..."

            if [ -n "$PREVIOUS_TAG" ]; then
              export IMAGE_TAG=$PREVIOUS_TAG
              docker-compose down
              docker-compose up -d
              echo "Rolled back to $PREVIOUS_TAG"
            else
              echo "No previous image found"
            fi

            exit 1


  # ---------------- FAILURE NOTIFICATION ----------------
  notify-failure:
    runs-on: ubuntu-latest
    needs: [security, build-and-push, deploy]
    if: failure()

    steps:
      - run: |
          echo "Pipeline failed!!!"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
