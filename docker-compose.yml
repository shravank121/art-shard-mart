version: "3.8"

services:
  caddy:
    image: caddy:alpine
    container_name: artshard-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - artshard-network

  backend:
    image: ${DOCKERHUB_USERNAME}/artshard-backend:${IMAGE_TAG}
    container_name: artshard-backend
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - RPC_URL=${RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - PINATA_JWT=${PINATA_JWT}
      - DEPLOY_BLOCK=${DEPLOY_BLOCK:-0}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://nftfract.duckdns.org}
    restart: unless-stopped
    networks:
      - artshard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKERHUB_USERNAME}/artshard-frontend:${IMAGE_TAG}
    container_name: artshard-frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - artshard-network

networks:
  artshard-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: